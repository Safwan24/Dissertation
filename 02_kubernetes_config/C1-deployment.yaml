apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-microservice
  namespace: dissertation-eval
  labels:
    app: nginx-microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-microservice
  template:
    metadata:
      labels:
        app: nginx-microservice
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
