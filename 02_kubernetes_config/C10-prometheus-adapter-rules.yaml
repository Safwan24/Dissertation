# C10-prometheus-adapter-rules.yaml
# Custom metric rules for multi-metric HPA experiment
# Exposes nginx HTTP request rate as a Kubernetes custom metric
apiVersion: v1
kind: ConfigMap
metadata:
  name: adapter-config
  namespace: monitoring
data:
  config.yaml: |
    rules:
      # Rule 1: HTTP requests per second per pod
      - seriesQuery: 'nginx_http_requests_total{namespace="dissertation-eval"}'
        resources:
          overrides:
            namespace: {resource: "namespace"}
            pod: {resource: "pod"}
        name:
          matches: "^(.*)_total$"
          as: "${1}_per_second"
        metricsQuery: 'rate(<<.Series>>{<<.LabelMatchers>>}[1m])'

      # Rule 2: Active nginx connections per pod
      - seriesQuery: 'nginx_connections_active{namespace="dissertation-eval"}'
        resources:
          overrides:
            namespace: {resource: "namespace"}
            pod: {resource: "pod"}
        name:
          matches: "^(.*)$"
          as: "${1}"
        metricsQuery: '<<.Series>>{<<.LabelMatchers>>}'
