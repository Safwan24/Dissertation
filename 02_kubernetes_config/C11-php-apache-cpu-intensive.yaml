apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-apache
  namespace: dissertation-eval
spec:
  replicas: 1
  selector:
    matchLabels:
      app: php-apache
  template:
    metadata:
      labels:
        app: php-apache
    spec:
      containers:
      - name: php-apache
        image: registry.k8s.io/hpa-example
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: php-apache-service
  namespace: dissertation-eval
spec:
  type: ClusterIP
  selector:
    app: php-apache
  ports:
  - port: 80
    targetPort: 80
